<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swapna Said YES 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    text-align: center;
    color: white;
}

.container {
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 3rem;
}

p {
    font-size: 1.5rem;
}

img {
    width: 220px;
    border-radius: 20px;
    margin-top: 20px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8);}
    to { opacity: 1; transform: scale(1);}
}

.heart {
    position: absolute;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity:1;}
    100% { transform: translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<div class="container">
    <h1>💖 SWAPNA SAID YES 💖</h1>
    <p>This is the best day of my life 😭💕</p>
    <p>I promise to always love you, Swapna ❤️</p>

    <img src="https://i.imgur.com/8Km9tLL.png">
</div>

<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 250);
</script>

</body>
</html>
